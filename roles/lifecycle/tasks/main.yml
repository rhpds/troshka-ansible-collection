---
- name: Start Troshka project
  when: ACTION == "start"
  block:
    - name: Start project
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: start_project
        project_id: "{{ troshka_project_id }}"
      register: _start_result
      ignore_errors: true

    - name: Wait for project to become active
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: deploy_progress
        project_id: "{{ troshka_project_id }}"
        wait: true
        wait_timeout: 600
        wait_interval: 10

- name: Stop Troshka project
  when: ACTION == "stop"
  block:
    - name: Stop project
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: stop_project
        project_id: "{{ troshka_project_id }}"
      register: _stop_result
      ignore_errors: true

    - name: Wait for project to stop
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: get_project
        project_id: "{{ troshka_project_id }}"
      register: _project_state
      until: _project_state.result.state | default('') == 'stopped'
      retries: 30
      delay: 10

- name: Get Troshka project status
  when: ACTION == "status"
  block:
    - name: Get project
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: get_project
        project_id: "{{ troshka_project_id }}"
      register: _project_info

    - name: Display project status
      ansible.builtin.debug:
        msg: |
          Project: {{ _project_info.result.name }} ({{ troshka_project_id[:8] }})
          State:   {{ _project_info.result.state }}
          OCP:     {{ _project_info.result.ocp_status | default('n/a') }}
