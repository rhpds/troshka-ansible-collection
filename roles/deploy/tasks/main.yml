---
# Deploy a pattern or template to Troshka

- name: Set project name
  ansible.builtin.set_fact:
    _troshka_project_name: "{{ guid | default(troshka_pattern_name | default('troshka-deployment')) }}"

- name: Deploy from pattern
  when: troshka_deploy_mode in ['pattern', 'pattern_workloads']
  block:
    - name: Deploy pattern
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: deploy_pattern
        pattern_name: "{{ troshka_pattern_name | default(omit) }}"
        pattern_id: "{{ troshka_pattern_id | default(omit) }}"
        project_name: "{{ _troshka_project_name }}"
      register: _troshka_deploy

    - name: Set project ID
      ansible.builtin.set_fact:
        troshka_project_id: "{{ _troshka_deploy.project_id }}"

- name: Deploy from template
  when: troshka_deploy_mode == 'template'
  block:
    - name: Fail if template YAML sections not defined
      ansible.builtin.fail:
        msg: "vms and networks are required for template deployment (from infra_template.yaml)"
      when: vms is not defined or networks is not defined

    - name: Build template YAML from agnosticv variables
      ansible.builtin.set_fact:
        _troshka_template_yaml:
          template_name: "{{ template_name | default(ocp.cluster_name | default('ocp')) }}"
          install_method: "{{ install_method | default('agent') }}"
          networks: "{{ networks }}"
          gateway: "{{ gateway | default({}) }}"
          vms: "{{ vms }}"
          ocp: "{{ ocp | default(omit) }}"
          dns_records: "{{ dns_records | default(omit) }}"
          disconnected: "{{ disconnected | default(omit) }}"
          bastion_services: "{{ bastion_services | default(omit) }}"

    - name: Deploy template
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: deploy_template
        template_yaml: "{{ _troshka_template_yaml }}"
        project_name: "{{ _troshka_project_name }}"
        common_password: "{{ common_password | default(omit) }}"
        auto_install_ocp: "{{ auto_install_ocp | default(true) }}"
        ssh_pub_key: "{{ ssh_provision_pubkey_content | default(omit) }}"
      register: _troshka_deploy

    - name: Set project ID
      ansible.builtin.set_fact:
        troshka_project_id: "{{ _troshka_deploy.project_id }}"

- name: Trigger deployment
  when: troshka_auto_deploy | default(true) | bool
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: trigger_deploy
    project_id: "{{ troshka_project_id }}"

- name: Wait for deployment to complete
  when: troshka_auto_deploy | default(true) | bool
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: deploy_progress
    project_id: "{{ troshka_project_id }}"
    wait: true
    wait_timeout: "{{ troshka_deploy_poll_retries | default(240) * troshka_deploy_poll_interval | default(15) }}"
    wait_interval: "{{ troshka_deploy_poll_interval | default(15) }}"

- name: Wait for OCP cluster readiness (auto_install_ocp only)
  when: auto_install_ocp | default(true) | bool
  block:
    - name: Get project OCP status
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: get_project
        project_id: "{{ troshka_project_id }}"
      register: _troshka_project_status

    - name: Wait for OCP cluster readiness
      when: _troshka_project_status.result.ocp_status | default('') == 'monitoring'
      agnosticd.cloud_provider_troshka.troshka_api:
        api_url: "{{ troshka_api_url }}"
        api_key: "{{ troshka_api_key }}"
        action: deploy_progress
        project_id: "{{ troshka_project_id }}"
        wait: true
        wait_timeout: "{{ (troshka_ocp_poll_retries | default(120)) * (troshka_ocp_poll_interval | default(60)) }}"
        wait_interval: "{{ troshka_ocp_poll_interval | default(60) }}"

- name: Create portal token
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: create_portal_token
    project_id: "{{ troshka_project_id }}"
    portal_access_level: "{{ troshka_portal_access_level }}"
  register: _troshka_portal_token

- name: Get project details
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: get_project
    project_id: "{{ troshka_project_id }}"
  register: _troshka_project

- name: Set output facts
  ansible.builtin.set_fact:
    troshka_project_id: "{{ troshka_project_id }}"
    troshka_portal_url: "{{ _troshka_portal_token.result.portal_url }}"

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - "Deployment complete"
      - "Project ID: {{ troshka_project_id }}"
      - "Portal URL: {{ troshka_portal_url }}"
