---
# Deploy a pattern or template to Troshka

- name: Set project name
  ansible.builtin.set_fact:
    _troshka_project_name: "{{ guid | default(troshka_pattern_name | default('troshka-deployment')) }}"

- name: Deploy from pattern
  when: troshka_deploy_mode in ['pattern', 'pattern_workloads']
  block:
    - name: Look up pattern by name
      when: troshka_pattern_id is not defined
      block:
        - name: Query patterns API
          ansible.builtin.uri:
            url: "{{ troshka_api_url }}/api/v1/patterns/?name={{ troshka_pattern_name | urlencode }}"
            method: GET
            headers:
              Authorization: "Bearer {{ troshka_api_key }}"
              Content-Type: "application/json"
            return_content: true
            status_code: 200
          register: _troshka_pattern_lookup
          no_log: true

        - name: Fail if pattern not found
          ansible.builtin.fail:
            msg: "Pattern '{{ troshka_pattern_name }}' not found"
          when: _troshka_pattern_lookup.json | length == 0

        - name: Extract pattern ID
          ansible.builtin.set_fact:
            troshka_pattern_id: "{{ _troshka_pattern_lookup.json[0].id }}"

    - name: Deploy pattern
      ansible.builtin.uri:
        url: "{{ troshka_api_url }}/api/v1/patterns/{{ troshka_pattern_id }}/deploy"
        method: POST
        headers:
          Authorization: "Bearer {{ troshka_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ _troshka_project_name }}"
          inject_vars: "{{ troshka_inject_vars }}"
          auto_deploy: "{{ troshka_auto_deploy }}"
          auto_start: "{{ troshka_auto_start }}"
          guid: "{{ guid | default(omit) }}"
          workloads_only: "{{ true if troshka_deploy_mode == 'pattern_workloads' else omit }}"
        return_content: true
        status_code: [200, 201]
      register: _troshka_deploy_response
      no_log: true

    - name: Set project ID
      ansible.builtin.set_fact:
        troshka_project_id: "{{ _troshka_deploy_response.json.id }}"

- name: Deploy from template
  when: troshka_deploy_mode == 'template'
  block:
    - name: Fail if template YAML sections not defined
      ansible.builtin.fail:
        msg: "vms and networks are required for template deployment (from infra_template.yaml)"
      when: vms is not defined or networks is not defined

    - name: Build template YAML from agnosticv variables
      ansible.builtin.set_fact:
        _troshka_template_yaml:
          template_name: "{{ template_name | default(ocp.cluster_name | default('ocp')) }}"
          install_method: "{{ install_method | default('agent') }}"
          networks: "{{ networks }}"
          gateway: "{{ gateway | default({}) }}"
          vms: "{{ vms }}"
          ocp: "{{ ocp | default(omit) }}"
          dns_records: "{{ dns_records | default(omit) }}"
          disconnected: "{{ disconnected | default(omit) }}"
          bastion_services: "{{ bastion_services | default(omit) }}"

    - name: Deploy template to Troshka
      ansible.builtin.uri:
        url: "{{ troshka_api_url }}/api/v1/projects/from-template"
        method: POST
        headers:
          Authorization: "Bearer {{ troshka_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          template_yaml: "{{ _troshka_template_yaml }}"
          name: "{{ _troshka_project_name }}"
          common_password: "{{ common_password | default(omit) }}"
          auto_install_ocp: "{{ auto_install_ocp | default(true) }}"
        return_content: true
        status_code: [200, 201]
      register: _troshka_template_response
      no_log: true

    - name: Set project ID
      ansible.builtin.set_fact:
        troshka_project_id: "{{ _troshka_template_response.json.id }}"

- name: Trigger deployment
  when: troshka_auto_deploy | default(true) | bool
  ansible.builtin.uri:
    url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}/deploy"
    method: POST
    headers:
      Authorization: "Bearer {{ troshka_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body: {}
    return_content: true
    status_code: [200, 202, 409]
  register: _troshka_deploy_trigger
  no_log: true

- name: Waiting for deployment to complete
  ansible.builtin.debug:
    msg: "Project {{ troshka_project_id }} is deploying — polling every {{ troshka_deploy_poll_interval }}s..."
  when: troshka_auto_deploy | default(true) | bool

- name: Poll deployment progress
  when: troshka_auto_deploy | default(true) | bool
  ansible.builtin.uri:
    url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}/deploy-progress"
    method: GET
    headers:
      Authorization: "Bearer {{ troshka_api_key }}"
      Content-Type: "application/json"
    status_code: 200
  register: _troshka_progress
  until: _troshka_progress.json.state in ['active', 'error']
  retries: "{{ troshka_deploy_poll_retries }}"
  delay: "{{ troshka_deploy_poll_interval }}"
  no_log: true

- name: Fail if deployment error
  ansible.builtin.fail:
    msg: "Deployment failed: {{ _troshka_progress.json.error_message | default('Unknown error') }}"
  when: _troshka_progress.json.state == 'error'

- name: Wait for OCP cluster readiness (auto_install_ocp only)
  when: auto_install_ocp | default(true) | bool
  block:
    - name: Check if project has OCP status to monitor
      ansible.builtin.uri:
        url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ troshka_api_key }}"
        return_content: true
        status_code: 200
      register: _troshka_project_status
      no_log: true

    - name: Waiting for OCP cluster readiness (this may take 15-30 minutes)
      ansible.builtin.debug:
        msg: "OCP status is 'monitoring' — polling until cluster is ready..."
      when: _troshka_project_status.json.ocp_status | default('') == 'monitoring'

    - name: Wait for OCP cluster readiness
      ansible.builtin.uri:
        url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ troshka_api_key }}"
        status_code: 200
      register: _troshka_ocp_wait
      until: _troshka_ocp_wait.json.ocp_status | default('') != 'monitoring'
      retries: "{{ troshka_ocp_poll_retries }}"
      delay: "{{ troshka_ocp_poll_interval }}"
      when: _troshka_project_status.json.ocp_status | default('') == 'monitoring'
  no_log: true

- name: Create portal token
  ansible.builtin.uri:
    url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}/portal-token"
    method: POST
    headers:
      Authorization: "Bearer {{ troshka_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      access_level: "{{ troshka_portal_access_level }}"
    return_content: true
    status_code: [200, 201]
  register: _troshka_portal_token
  no_log: true

- name: Get project details for bastion IP
  ansible.builtin.uri:
    url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ troshka_api_key }}"
      Content-Type: "application/json"
    return_content: true
    status_code: 200
  register: _troshka_project
  no_log: true

- name: Extract bastion external IP
  ansible.builtin.set_fact:
    _troshka_bastion_external_ip: >-
      {{
        _troshka_project.json.topology.externalIps
        | selectattr('type', 'equalto', 'bastion')
        | map(attribute='ip')
        | first
        | default('')
      }}

- name: Set output facts
  ansible.builtin.set_fact:
    troshka_project_id: "{{ troshka_project_id }}"
    troshka_portal_url: "{{ _troshka_portal_token.json.portal_url }}"
    troshka_showroom_url: "https://{{ _troshka_bastion_external_ip }}"

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - "Deployment complete"
      - "Project ID: {{ troshka_project_id }}"
      - "Portal URL: {{ troshka_portal_url }}"
      - "Showroom URL: {{ troshka_showroom_url }}"
