---
# Default variables for troshka.cloud.deploy role

# Deployment mode: "pattern", "pattern_workloads", or "template"
troshka_deploy_mode: "pattern"

# Auto-deploy after creating project
troshka_auto_deploy: true

# Auto-start VMs after deployment
troshka_auto_start: true

# Portal access level: "console", "readonly", "full"
troshka_portal_access_level: "console"

# Variables to inject into bastion VM (empty by default)
troshka_inject_vars: {}

# Polling configuration
troshka_deploy_poll_interval: 15
troshka_deploy_poll_retries: 240  # 1 hour timeout (240 * 15s)

# OCP readiness polling — longer intervals for template mode (full install)
troshka_ocp_poll_interval: "{{ 60 if troshka_deploy_mode == 'template' else 15 }}"
troshka_ocp_poll_retries: "{{ 120 if troshka_deploy_mode == 'template' else 60 }}"
