---
# Build Ansible inventory from Troshka project topology
# Uses the Troshka connection plugin (exec API) — no SSH or external IPs needed

- name: Get project topology
  ansible.builtin.uri:
    url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ troshka_api_key }}"
      Content-Type: "application/json"
    return_content: true
    status_code: 200
  register: _troshka_project
  no_log: true

- name: Extract topology
  ansible.builtin.set_fact:
    _troshka_topology: "{{ _troshka_project.json.topology }}"

- name: Find bastion VM
  ansible.builtin.set_fact:
    _troshka_bastion_vm: >-
      {{
        _troshka_topology.nodes
        | selectattr('type', 'equalto', 'vmNode')
        | selectattr('data.tags.AnsibleGroup', 'defined')
        | selectattr('data.tags.AnsibleGroup', 'search', 'bastions')
        | first
        | default({})
      }}

- name: Fail if bastion not found
  ansible.builtin.fail:
    msg: "No bastion VM found in topology (must have AnsibleGroup tag containing 'bastions')"
  when: _troshka_bastion_vm == {}

- name: Set bastion VM ID
  ansible.builtin.set_fact:
    troshka_bastion_vm_id: "{{ _troshka_bastion_vm.id }}"

- name: Extract bastion internal IP
  ansible.builtin.set_fact:
    _troshka_bastion_internal_ip: >-
      {{
        _troshka_bastion_vm.data.nics[0].ip
        | default('')
      }}

- name: Parse bastion groups
  ansible.builtin.set_fact:
    _troshka_bastion_groups: >-
      {{
        _troshka_bastion_vm.data.tags.AnsibleGroup
        | split(',')
        | map('trim')
        | list
      }}

- name: Add bastion to inventory (Troshka connection plugin)
  ansible.builtin.add_host:
    name: "{{ _troshka_bastion_vm.data.name }}"
    ansible_connection: agnosticd.cloud_provider_troshka.troshka
    ansible_user: "{{ ansible_user | default('cloud-user') }}"
    troshka_api_url: "{{ troshka_api_url }}"
    troshka_api_key: "{{ troshka_api_key }}"
    troshka_project_id: "{{ troshka_project_id }}"
    troshka_vm_id: "{{ _troshka_bastion_vm.id }}"
    groups: "{{ _troshka_bastion_groups }}"
    troshka_internal_ip: "{{ _troshka_bastion_internal_ip }}"
    troshka_is_bastion: true

- name: Add inner VMs to inventory (Troshka connection plugin)
  ansible.builtin.add_host:
    name: "{{ item.data.name }}"
    ansible_connection: agnosticd.cloud_provider_troshka.troshka
    ansible_user: "{{ ansible_user | default('cloud-user') }}"
    troshka_api_url: "{{ troshka_api_url }}"
    troshka_api_key: "{{ troshka_api_key }}"
    troshka_project_id: "{{ troshka_project_id }}"
    troshka_vm_id: "{{ item.id }}"
    groups: "{{ item.data.tags.AnsibleGroup | split(',') | map('trim') | list }}"
    troshka_internal_ip: "{{ item.data.nics[0].ip | default('') }}"
    troshka_is_bastion: false
  loop: >-
    {{
      _troshka_topology.nodes
      | selectattr('type', 'equalto', 'vmNode')
      | selectattr('data.tags.AnsibleGroup', 'defined')
      | rejectattr('id', 'equalto', _troshka_bastion_vm.id)
      | list
    }}
  loop_control:
    label: "{{ item.data.name }}"

- name: Display inventory summary
  ansible.builtin.debug:
    msg:
      - "Inventory created from Troshka project {{ troshka_project_id }}"
      - "Connection: Troshka exec API (no SSH/external IP needed)"
      - "Bastion: {{ _troshka_bastion_vm.data.name }} ({{ _troshka_bastion_internal_ip }})"
      - "Total VMs: {{ _troshka_topology.nodes | selectattr('type', 'equalto', 'vmNode') | list | length }}"
