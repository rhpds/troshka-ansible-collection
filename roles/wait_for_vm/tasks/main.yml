---
- name: Wait for VM to be reachable
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: vm_ready
    project_id: "{{ troshka_project_id }}"
    vm_id: "{{ _wait_vm_id }}"
  register: _vm_ready
  until: _vm_ready.ready | default(false) | bool
  retries: "{{ troshka_wait_retries | default(30) }}"
  delay: "{{ troshka_wait_delay | default(10) }}"

- name: VM is reachable
  ansible.builtin.debug:
    msg: "VM {{ _wait_vm_id }} is reachable"
