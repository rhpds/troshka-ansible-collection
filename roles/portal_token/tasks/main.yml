---
- name: Create portal token
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: create_portal_token
    project_id: "{{ troshka_project_id }}"
    portal_access_level: "{{ troshka_portal_access_level | default('console') }}"
  register: _portal_result

- name: Set portal URL fact
  ansible.builtin.set_fact:
    troshka_portal_url: "{{ _portal_result.result.portal_url }}"

- name: Display portal URL
  ansible.builtin.debug:
    msg: "Portal URL: {{ troshka_portal_url }}"
