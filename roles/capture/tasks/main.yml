---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - troshka_capture_pattern_name is defined
      - troshka_capture_pattern_name | length > 0
    fail_msg: "troshka_capture_pattern_name must be defined and non-empty"

- name: Capture pattern from project
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: capture_pattern
    project_id: "{{ troshka_project_id }}"
    capture_name: "{{ troshka_capture_pattern_name }}"
    capture_visibility: "{{ troshka_capture_visibility }}"
    wait: true
    wait_timeout: 1800
    wait_interval: 15
  register: _capture_result

- name: Set pattern facts
  ansible.builtin.set_fact:
    troshka_captured_pattern_id: "{{ _capture_result.pattern_id }}"
    troshka_captured_pattern_name: "{{ troshka_capture_pattern_name }}"

- name: Delete source project after capture
  when: troshka_delete_after_capture | bool
  agnosticd.cloud_provider_troshka.troshka_api:
    api_url: "{{ troshka_api_url }}"
    api_key: "{{ troshka_api_key }}"
    action: delete_project
    project_id: "{{ troshka_project_id }}"
